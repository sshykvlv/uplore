services:
  uplore:
    build: .
    image: uplore:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - uplore_data:/data
    env_file:
      - .env
    environment:
      # These defaults are set in the Dockerfile; listed here for visibility.
      # Override in .env to change paths or any other setting.
      DATABASE_PATH: /data/uplore.db
      UPLOADS_PATH: /data/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  uplore_data:
    driver: local
