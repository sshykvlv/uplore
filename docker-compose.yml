services:
  uplore:
    build: .
    image: uplore:latest
    restart: unless-stopped
    ports:
      # HOST_PORT = the loopback port nginx proxies to; the app always listens
      # on 3000 INSIDE the container (pinned below, so a stray PORT in .env can't
      # desync the mapping/healthcheck).
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    volumes:
      - uplore_data:/data
    env_file:
      - .env
    environment:
      # These defaults are set in the Dockerfile; listed here for visibility.
      # Override in .env to change paths or any other setting.
      PORT: 3000
      DATABASE_PATH: /data/uplore.db
      UPLOADS_PATH: /data/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  uplore_data:
    driver: local
