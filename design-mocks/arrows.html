<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindling — arrow glyphs</title>
<style>
  :root{
    --bg:#fbfbfa;--card:#fff;--line:#ececea;--ink:#1a1a18;--muted:#8a8a84;
    --accent:#e8602c;--accent-soft:#fdeee7;--icon:#b4b4ae;--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45;padding:30px 16px 60px}
  .wrap{max-width:560px;margin:0 auto}
  h2{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:6px 4px 18px}

  .row{display:flex;align-items:center;gap:16px;margin-bottom:12px}
  .lbl{font-size:13px;color:var(--muted);width:150px;flex-shrink:0}
  .lbl b{color:var(--ink);font-weight:600;display:block;font-size:14px}

  /* horizontal capsule */
  .cap{display:inline-flex;align-items:center;gap:8px;
    padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;
    cursor:pointer;transition:.15s;font-weight:700;font-size:15px;letter-spacing:-.02em;user-select:none}
  .cap:hover{border-color:#dcdcd8}
  .cap.on{background:var(--accent-soft);border-color:#f3b79b;color:var(--accent)}
  .cap svg{display:block}
  .cap .up{color:var(--icon)}
  .cap .dn{color:var(--icon)}
  .cap.on .up{color:var(--accent)}
  .glyph{font-size:13px;line-height:1;color:var(--icon)}
</style>
</head>
<body>
<div class="wrap">
  <h2>Capsule + arrow glyph options</h2>

  <!-- 1 thin chevron -->
  <div class="row">
    <div class="lbl"><b>1 · Thin chevron</b>SVG, 1.5 stroke</div>
    <div class="cap on">
      <svg class="up" width="13" height="9" viewBox="0 0 13 9" fill="none"><path d="M1.5 7L6.5 2L11.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      142
      <svg class="dn" width="13" height="9" viewBox="0 0 13 9" fill="none"><path d="M1.5 2L6.5 7L11.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cap">
      <svg class="up" width="13" height="9" viewBox="0 0 13 9" fill="none"><path d="M1.5 7L6.5 2L11.5 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      97
      <svg class="dn" width="13" height="9" viewBox="0 0 13 9" fill="none"><path d="M1.5 2L6.5 7L11.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- 2 bold rounded chevron -->
  <div class="row">
    <div class="lbl"><b>2 · Bold chevron</b>SVG, 2.4 stroke, round</div>
    <div class="cap on">
      <svg class="up" width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M2 7L7 2.5L12 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      142
      <svg class="dn" width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M2 2L7 6.5L12 2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cap">
      <svg class="up" width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M2 7L7 2.5L12 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      97
      <svg class="dn" width="14" height="9" viewBox="0 0 14 9" fill="none"><path d="M2 2L7 6.5L12 2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- 3 line arrow -->
  <div class="row">
    <div class="lbl"><b>3 · Line arrow</b>full ↑ ↓ with stem</div>
    <div class="cap on">
      <svg class="up" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 11V2M6.5 2L3 5.5M6.5 2L10 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      142
      <svg class="dn" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2V11M6.5 11L3 7.5M6.5 11L10 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="cap">
      <svg class="up" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 11V2M6.5 2L3 5.5M6.5 2L10 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      97
      <svg class="dn" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 2V11M6.5 11L3 7.5M6.5 11L10 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- 4 triangle outline -->
  <div class="row">
    <div class="lbl"><b>4 · Triangle outline</b>△ ▽</div>
    <div class="cap on">
      <svg class="up" width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M6.5 2L11 9H2L6.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      142
      <svg class="dn" width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M6.5 9L2 2H11L6.5 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </div>
    <div class="cap">
      <svg class="up" width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M6.5 2L11 9H2L6.5 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      97
      <svg class="dn" width="13" height="11" viewBox="0 0 13 11" fill="none"><path d="M6.5 9L2 2H11L6.5 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <!-- 5 caret (^ v) -->
  <div class="row">
    <div class="lbl"><b>5 · Soft caret</b>wide, short</div>
    <div class="cap on">
      <svg class="up" width="15" height="8" viewBox="0 0 15 8" fill="none"><path d="M2 6L7.5 2L13 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      142
      <svg class="dn" width="15" height="8" viewBox="0 0 15 8" fill="none"><path d="M2 2L7.5 6L13 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div class="cap">
      <svg class="up" width="15" height="8" viewBox="0 0 15 8" fill="none"><path d="M2 6L7.5 2L13 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      97
      <svg class="dn" width="15" height="8" viewBox="0 0 15 8" fill="none"><path d="M2 2L7.5 6L13 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- 6 current filled (reference) -->
  <div class="row">
    <div class="lbl"><b>6 · Filled triangle</b>current (dated)</div>
    <div class="cap on"><span class="glyph up" style="color:var(--accent)">▲</span>142<span class="glyph dn">▼</span></div>
    <div class="cap"><span class="glyph up">▲</span>97<span class="glyph dn">▼</span></div>
  </div>

</div>
</body>
</html>
